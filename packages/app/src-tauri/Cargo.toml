[package]
name = "amphetamine"
version = "0.1.0"
description = "A macOS app for playing module files."
authors = ["aspizu"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "amphetamine_lib"
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
discord-presence = "2.1.1"
log = "0.4"
specta = { version = "=2.0.0-rc.25", features = ["derive"] }
specta-typescript = "0.0.12"
tauri = { version = "2.11.3", features = [] }
tauri-specta = { version = "=2.0.0-rc.25", features = ["derive", "typescript"] }
tauri-plugin-log = "2"
tauri-plugin-fs = "2"
